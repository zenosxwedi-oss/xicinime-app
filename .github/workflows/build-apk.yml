name: Build Xicinime APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: artifacts/xicinime/android
          key: ${{ runner.os }}-expo-prebuild-${{ hashFiles('artifacts/xicinime/app.json', 'artifacts/xicinime/package.json') }}

      - name: Expo prebuild (generate native Android code)
        working-directory: artifacts/xicinime
        run: |
          pnpm exec expo prebuild \
            --platform android \
            --no-install \
            --clean
        env:
          EXPO_NO_DOCTOR: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            artifacts/xicinime/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/xicinime/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/xicinime/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/xicinime/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xicinime-debug-apk
          path: artifacts/xicinime/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK size
        run: |
          APK=artifacts/xicinime/android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ APK built successfully — size: $SIZE"
          else
            echo "❌ APK not found"
            exit 1
          fi
