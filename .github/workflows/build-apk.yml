name: Build Xicinime APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild (generate native Android code)
        working-directory: artifacts/xicinime
        run: pnpm exec expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_DOCTOR: 1

      # ── Generate a local keystore for signing ──────────────────────────
      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/release.keystore \
            -storepass xicinime123 \
            -alias xicinime \
            -keypass xicinime123 \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Xicinime,OU=App,O=Xicinime,L=ID,S=ID,C=ID" \
            -noprompt

      # ── Inject release signing + ABI split + size optimizations ───────
      - name: Configure Gradle for slim release build
        working-directory: artifacts/xicinime/android
        run: |
          # Write signing config into gradle.properties
          cat >> gradle.properties << 'EOF'

          RELEASE_STORE_FILE=/tmp/release.keystore
          RELEASE_STORE_PASSWORD=xicinime123
          RELEASE_KEY_ALIAS=xicinime
          RELEASE_KEY_PASSWORD=xicinime123
          EOF

          # Patch app/build.gradle: add signing + splits + shrink
          python3 - << 'PYEOF'
          import re

          with open("app/build.gradle", "r") as f:
              content = f.read()

          # 1. Add signingConfigs block before android { if not present
          signing_block = """
          signingConfigs {
              release {
                  storeFile file(RELEASE_STORE_FILE)
                  storePassword RELEASE_STORE_PASSWORD
                  keyAlias RELEASE_KEY_ALIAS
                  keyPassword RELEASE_KEY_PASSWORD
              }
          }
          """

          # 2. Replace buildTypes.release to use signing + enable shrinking
          content = re.sub(
              r'(buildTypes\s*\{[^}]*?release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release\n            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"\n',
              content,
              flags=re.DOTALL
          )

          # 3. Add ABI splits after defaultConfig block
          splits_block = """
              splits {
                  abi {
                      enable true
                      reset()
                      // arm64-v8a  = all modern Android phones (64-bit)
                      // armeabi-v7a = older 32-bit phones (optional, adds ~15MB)
                      include "arm64-v8a"
                      universalApk false
                  }
              }
          """
          # Insert after the closing brace of defaultConfig
          content = re.sub(
              r'(defaultConfig\s*\{.*?\})',
              r'\1\n' + splits_block,
              content,
              count=1,
              flags=re.DOTALL
          )

          # 4. Add signingConfigs before android block
          content = re.sub(
              r'(android\s*\{)',
              signing_block + r'\1',
              content,
              count=1
          )

          with open("app/build.gradle", "w") as f:
              f.write(content)

          print("✅ build.gradle patched")
          PYEOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            artifacts/xicinime/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/xicinime/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/xicinime/android
        run: chmod +x gradlew

      - name: Build Release APK (arm64 only)
        working-directory: artifacts/xicinime/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Find and rename APK
        run: |
          APK=$(find artifacts/xicinime/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK size: $SIZE"
          cp "$APK" /tmp/xicinime-release-arm64.apk
          echo "APK_PATH=/tmp/xicinime-release-arm64.apk" >> $GITHUB_ENV
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xicinime-release-arm64
          path: /tmp/xicinime-release-arm64.apk
          retention-days: 60

      - name: Summary
        run: echo "✅ APK release arm64 — ${{ env.APK_SIZE }}" >> $GITHUB_STEP_SUMMARY
