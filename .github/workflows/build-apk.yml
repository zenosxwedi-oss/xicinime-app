name: Build Xicinime APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (arm64 + arm32)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        working-directory: artifacts/xicinime
        run: pnpm exec expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_DOCTOR: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            artifacts/xicinime/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/xicinime/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/xicinime/android
        run: chmod +x gradlew

      # ── arm64-v8a + armeabi-v7a: support semua HP Android 2012+ ────────
      - name: Build Debug APK — arm64 + arm32
        working-directory: artifacts/xicinime/android
        run: |
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Find APK and report size
        run: |
          APK=$(find artifacts/xicinime/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "✅ APK: $APK — $SIZE"
          cp "$APK" /tmp/xicinime-all-arch.apk
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xicinime-apk
          path: /tmp/xicinime-all-arch.apk
          retention-days: 60

      - name: Job summary
        run: echo "### ✅ APK arm64+arm32 selesai — ${{ env.APK_SIZE }}" >> $GITHUB_STEP_SUMMARY
