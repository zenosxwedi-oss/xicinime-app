name: Build Xicinime APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (arm64 + arm32)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # react-native-google-mobile-ads@14.x punya bug di RN 0.81:
      # currentActivity bukan lagi property langsung, harus via reactApplicationContext.
      # Patch ini HANYA ganti currentActivity — tidak sentuh yang lain.
      - name: Patch google-mobile-ads (RN 0.81 compat)
        run: |
          FILE=$(find . -path "*/react-native-google-mobile-ads/android/src/main/java/io/invertase/googlemobileads/ReactNativeGoogleMobileAdsModule.kt" 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            echo "Patching: $FILE"
            perl -i -pe 's/(?<![a-zA-Z0-9_\.])currentActivity/reactApplicationContext.currentActivity/g' "$FILE"
            perl -i -pe 's/reactApplicationContext\.reactApplicationContext\./reactApplicationContext./g' "$FILE"
            echo "Baris currentActivity setelah patch:"
            grep -n "currentActivity" "$FILE"
            echo "✅ Patch selesai"
          else
            echo "File tidak ditemukan, skip"
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild
        working-directory: artifacts/xicinime
        run: pnpm exec expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_DOCTOR: 1

      # Cache Gradle SETELAH prebuild — key pakai pnpm-lock.yaml (stabil)
      # android/ di-generate oleh prebuild, tidak bisa dijadikan hash key yang reliabel
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('artifacts/xicinime/app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: artifacts/xicinime/android
        run: chmod +x gradlew

      - name: Build Debug APK — arm64 + arm32
        working-directory: artifacts/xicinime/android
        run: |
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Find APK
        run: |
          APK=$(find artifacts/xicinime/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "✅ APK: $APK — $SIZE"
          cp "$APK" /tmp/xicinime-all-arch.apk
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xicinime-apk
          path: /tmp/xicinime-all-arch.apk
          retention-days: 60

      - name: Job summary
        run: echo "### ✅ APK ${{ env.APK_SIZE }} — arm64+arm32, Old Arch, AdMob" >> $GITHUB_STEP_SUMMARY
