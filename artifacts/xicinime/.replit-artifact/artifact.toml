kind = "mobile"
previewPath = "/"
title = "Xicinime"
version = "1.0.0"
id = "artifacts/xicinime"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 20827

[services.development]
run = "pnpm --filter @workspace/xicinime run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xicinime", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/xicinime", "run", "serve" ]

[services.env]
PORT = "20827"
BASE_PATH = "/"
